<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TOTONO | 分析・推移</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/analysis.css">
</head>

<body>

<div class="phone fade">

    <!-- ヘッダー -->

    <header>

        <div class="header-top">

            <a href="../index.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
            </a>

            <h1>分析・推移</h1>

            <div style="width:40px;"></div>

        </div>

        <p id="today"></p>

    </header>

    <!-- メイン -->

    <main>

        <!-- 総合スコア -->

        <section class="card">

            <div class="card-title">

                📊 今週のコンディション

            </div>

            <div class="score-box">

                <div class="score-circle">

                    <span id="totalScore">84</span>

                </div>

                <h2>Excellent</h2>

                <p>先週より +6 ポイント</p>

            </div>

        </section>

        <!-- 分析 -->

        <section class="card">

            <div class="card-title">

                📈 コンディション分析

            </div>

            <div class="analysis-grid">

                <div class="analysis-item">

                    <i class="fa-solid fa-bed"></i>

                    <h3>睡眠</h3>

                    <strong>7.5時間</strong>

                </div>

                <div class="analysis-item">

                    <i class="fa-solid fa-bowl-food"></i>

                    <h3>食事</h3>

                    <strong>90点</strong>

                </div>

                <div class="analysis-item">

                    <i class="fa-solid fa-dumbbell"></i>

                    <h3>運動</h3>

                    <strong>80分</strong>

                </div>

                <div class="analysis-item">

                    <i class="fa-solid fa-glass-water"></i>

                    <h3>水分</h3>

                    <strong>2100ml</strong>

                </div>

            </div>

        </section>

        <!-- グラフ -->

        <section class="card">

            <div class="card-title">

                📉 コンディション推移

            </div>

            <canvas id="conditionChart"></canvas>

        </section>

        <!-- AIアドバイス -->

        <section class="card ai-card">

            <div class="card-title">

                🤖 AIアドバイス

            </div>

            <p id="aiComment">

                睡眠時間が安定しています。<br>
                この調子で継続しましょう！<br><br>

                水分摂取量が少し不足しています。<br>
                練習中もこまめな補給を心掛けましょう。

            </p>

        </section>

        <!-- 今週の平均 -->

        <section class="card">

            <div class="card-title">

                📋 今週の平均

            </div>

            <ul class="list">

                <li>

                    <span>睡眠時間</span>

                    <strong>7.5時間</strong>

                </li>

                <li>

                    <span>運動時間</span>

                    <strong>80分</strong>

                </li>

                <li>

                    <span>水分摂取</span>

                    <strong>2100ml</strong>

                </li>

                <li>

                    <span>コンディション</span>

                    <strong>84点</strong>

                </li>

            </ul>

        </section>

    </main>

    <!-- 下部ナビ -->

    <nav class="bottom-nav">

        <a href="../index.html">

            <i class="fa-solid fa-house"></i>

            <span>ホーム</span>

        </a>

        <a href="analysis.html" class="active">

            <i class="fa-solid fa-chart-line"></i>

            <span>分析</span>

        </a>

        <a href="graph.html">

            <i class="fa-solid fa-chart-column"></i>

            <span>グラフ</span>

        </a>

        <a href="challenge.html">

            <i class="fa-solid fa-bullseye"></i>

            <span>目標</span>

        </a>

        <a href="mypage.html">

            <i class="fa-solid fa-user"></i>

            <span>マイページ</span>

        </a>

    </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="../js/common.js"></script>

<script src="../js/analysis.js"></script>

</body>

</html>
