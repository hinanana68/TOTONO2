<div class="header-top">

<i class="fa-solid fa-arrow-left"></i>

<h1>
目標チャレンジ
</h1>


<div style="width:40px;"></div>


</div>


<p id="today"></p>

<!-- ===== メイン ===== -->

<main>



<h2 class="section-title">
今週の目標
</h2>



<!-- 目標 -->

<section class="card">


<div class="card-title">
🎯 チャレンジ項目
</div>



<label class="challenge-item">

<input type="checkbox">

<span>
睡眠7時間を達成する
</span>

</label>




<label class="challenge-item">

<input type="checkbox">

<span>
水分2000ml飲む
</span>

</label>




<label class="challenge-item">

<input type="checkbox">

<span>
ストレッチをする
</span>

</label>



</section>







<!-- 達成率 -->


<section class="card score">


<div class="card-title">
🏆 達成率
</div>



<div class="circle">


<div class="circle-inner">

<span id="percent">
0%

</span>


</div>


</div>


</section>







<!-- 継続 -->


<section class="card">


<div class="card-title">
🔥 継続記録
</div>



<div class="streak-box">

<span id="streak">
0日
</span>


<p>
継続中！
</p>


</div>


</section>







<!-- AI -->


<section class="card ai-card">


<div class="card-title">
💡 TOTONO AI
</div>


<p>

今日もコンディション管理を
続けられています。
小さな積み重ねが大切です！

</p>


</section>







<button class="btn" id="saveBtn">

保存する

</button>
