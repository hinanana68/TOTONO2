<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOTONO（トトノ）- コンディション入力</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="phone">
  <div class="screen">

    <div class="statusbar">
      <span>9:41</span>
      <span class="icons">📶 🔋</span>
    </div>

    <div class="content">
      <div class="topbar">
        <span class="back" onclick="location.href='index.html'">‹</span>
        <h1>コンディション入力</h1>
      </div>

      <div class="field">
        <div class="field-label"><span class="fi">🕒</span>睡眠時間</div>
        <div class="time-input">
          <input type="number" value="7" min="0" max="24" id="sleepH">
          <span class="unit">時間</span>
          <span class="sep">:</span>
          <input type="number" value="30" min="0" max="59" id="sleepM">
          <span class="unit">分</span>
        </div>
      </div>

      <div class="field">
        <div class="field-label"><span class="fi">✨</span>睡眠の質</div>
        <div class="stars" data-group="sleepQ">
          <span class="star filled">★</span>
          <span class="star filled">★</span>
          <span class="star filled">★</span>
          <span class="star filled">★</span>
          <span class="star">★</span>
        </div>
      </div>

      <div class="field">
        <div class="field-label"><span class="fi">🔋</span>疲労度</div>
        <div class="stars" data-group="fatigue">
          <span class="star filled">★</span>
          <span class="star filled">★</span>
          <span class="star">★</span>
          <span class="star">★</span>
          <span class="star">★</span>
        </div>
      </div>

      <div class="field">
        <div class="field-label"><span class="fi">⚖️</span>体重</div>
        <div class="num-input">
          <span style="font-size:13px;color:var(--text-sub);">記録する体重</span>
          <div><input type="number" value="67.8" step="0.1" id="weight"><span class="unit">kg</span></div>
        </div>
      </div>

      <div class="field">
        <div class="field-label"><span class="fi">🙂</span>気分</div>
        <div class="mood-row" data-group="mood">
          <span class="mood selected" data-val="great">😄</span>
          <span class="mood" data-val="good">🙂</span>
          <span class="mood" data-val="normal">😐</span>
          <span class="mood" data-val="bad">😞</span>
        </div>
      </div>

      <div class="field">
        <div class="field-label"><span class="fi">🌡️</span>体温</div>
        <div class="num-input">
          <span style="font-size:13px;color:var(--text-sub);">今朝の体温</span>
          <div><input type="number" value="36.5" step="0.1" id="temp"><span class="unit">℃</span></div>
        </div>
      </div>

      <button class="save-btn" id="saveBtn">保存する</button>
    </div>

    <div class="toast" id="toastEl">保存しました</div>

    <div class="bottomnav">
      <button class="navitem" onclick="location.href='index.html'">
        <span class="navicon">🏠</span>ホーム
      </button>
      <button class="navitem" onclick="alert('グラフ画面は準備中です')">
        <span class="navicon">📊</span>グラフ
      </button>
      <button class="navitem" onclick="alert('カレンダー画面は準備中です')">
        <span class="navicon">📅</span>カレンダー
      </button>
      <button class="navitem active">
        <span class="navicon">📝</span>記録
      </button>
      <button class="navitem" onclick="alert('マイページは準備中です')">
        <span class="navicon">👤</span>マイページ
      </button>
    </div>

  </div>
</div>

<script src="js/condition.js"></script>
</body>
</html>
